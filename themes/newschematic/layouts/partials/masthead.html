<header class="ns-site-masthead">
  <div class="ns-site-masthead-inner">

    <a href="{{ "/" | relURL }}" class="ns-site-brand" aria-label="{{ .Site.Title }} — home">
      {{ partial "mark.html" (dict "size" 32) }}
      <span class="ns-site-title">{{ .Site.Title }}</span>
    </a>

    <nav class="ns-site-nav" aria-label="Primary">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}"
           class="ns-site-nav-link{{ if $.IsMenuCurrent "main" . }} is-current{{ end }}">
          {{ .Name }}
        </a>
      {{ end }}

      <button type="button" class="ns-theme-toggle" aria-label="Toggle dark mode"
              onclick="(function(){var d=document.documentElement;var dark=d.classList.toggle('ns-dark');try{localStorage.setItem('ns-theme',dark?'dark':'light');}catch(e){}})()">
        <span class="ns-theme-toggle-mark" aria-hidden="true"></span>
      </button>
    </nav>
  </div>

  <div class="ns-site-masthead-rule"></div>
</header>
