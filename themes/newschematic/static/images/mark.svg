<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Transparent background so it adapts to browser chrome -->
  <circle cx="30" cy="30" r="22" fill="none" stroke="#1C1917" stroke-width="1"/>
  <circle cx="30" cy="30" r="14" fill="none" stroke="#1C1917" stroke-width="1"/>
  <path d="M30 4 L30 56 M4 30 L56 30" stroke="#1C1917" stroke-width="1"/>
  <circle cx="30" cy="30" r="4.5" fill="#6B1D1D"/>
  <!-- Dark-mode variant: the ink strokes flip to warm paper when the browser is dark -->
  <style>
    @media (prefers-color-scheme: dark) {
      circle[fill="none"], path { stroke: #E8E0D0; }
      circle[fill="#6B1D1D"] { fill: #C96A5C; }
    }
  </style>
</svg>
